AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AWS Config rule that detects Kinesis streams without CMK encryption
  and auto-remediates by dynamically creating a CMK (if one does not
  already exist) and enabling encryption on the non-compliant stream.
  No CMK is pre-deployed — it is created on first remediation only.

Resources:

  # -------------------------------------------------------
  # IAM Role — Lambda execution for Config rule evaluation
  # -------------------------------------------------------
  ConfigRuleLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: kinesis-config-rule-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ConfigEvaluationPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - config:PutEvaluations
                Resource: "*"
              - Effect: Allow
                Action:
                  - kinesis:DescribeStreamSummary
                  - kinesis:ListStreams
                Resource: "*"

  # -------------------------------------------------------
  # Lambda — evaluates Kinesis streams for CMK compliance
  # -------------------------------------------------------
  ConfigRuleLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: kinesis-cmk-config-evaluator
      Description: Config rule evaluator — checks Kinesis streams use a CMK not aws/kinesis
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ConfigRuleLambdaRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import json
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          kinesis = boto3.client('kinesis')
          config  = boto3.client('config')

          def is_cmk(encryption_type, key_id):
              if encryption_type != 'KMS':
                  return False
              if not key_id:
                  return False
              if 'aws/kinesis' in str(key_id):
                  return False
              return True

          def evaluate_stream(stream_name):
              try:
                  resp = kinesis.describe_stream_summary(StreamName=stream_name)
                  summary = resp['StreamDescriptionSummary']
                  enc_type = summary.get('EncryptionType', 'NONE')
                  key_id   = summary.get('KeyId', '')
                  compliant = is_cmk(enc_type, key_id)
                  logger.info(
                      "Stream %s — EncryptionType=%s KeyId=%s Compliant=%s",
                      stream_name, enc_type, key_id, compliant
                  )
                  return 'COMPLIANT' if compliant else 'NON_COMPLIANT'
              except kinesis.exceptions.ResourceNotFoundException:
                  return 'NOT_APPLICABLE'
              except Exception as e:
                  logger.error("Error evaluating stream %s: %s", stream_name, str(e))
                  return 'NON_COMPLIANT'

          def handler(event, context):
              invoking_event = json.loads(event['invokingEvent'])
              result_token   = event['resultToken']

              # Scheduled run — evaluate ALL streams
              if event.get('eventLeftScope') is False or \
                 invoking_event.get('messageType') == 'ScheduledNotification':
                  paginator = kinesis.get_paginator('list_streams')
                  evaluations = []
                  for page in paginator.paginate():
                      for stream in page.get('StreamSummaries', []):
                          compliance = evaluate_stream(stream['StreamName'])
                          evaluations.append({
                              'ComplianceResourceType': 'AWS::Kinesis::Stream',
                              'ComplianceResourceId':   stream['StreamName'],
                              'ComplianceType':         compliance,
                              'OrderingTimestamp':      invoking_event.get(
                                  'notificationCreationTime',
                                  context.invoked_function_arn
                              )
                          })
                  if evaluations:
                      for i in range(0, len(evaluations), 100):
                          config.put_evaluations(
                              Evaluations=evaluations[i:i+100],
                              ResultToken=result_token
                          )
                  return

              # Change-triggered — evaluate the specific stream
              ci = invoking_event.get('configurationItem', {})
              if ci.get('resourceType') != 'AWS::Kinesis::Stream':
                  return

              compliance = evaluate_stream(ci['resourceName'])
              config.put_evaluations(
                  Evaluations=[{
                      'ComplianceResourceType': 'AWS::Kinesis::Stream',
                      'ComplianceResourceId':   ci['resourceName'],
                      'ComplianceType':         compliance,
                      'OrderingTimestamp':      ci['configurationItemCaptureTime']
                  }],
                  ResultToken=result_token
              )

  ConfigLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ConfigRuleLambda.Arn
      Action: lambda:InvokeFunction
      Principal: config.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  # -------------------------------------------------------
  # Config Rule
  # -------------------------------------------------------
  KinesisCMKConfigRule:
    Type: AWS::Config::ConfigRule
    DependsOn: ConfigLambdaPermission
    Properties:
      ConfigRuleName: kinesis-streams-must-use-cmk
      Description: >
        Checks that all Kinesis Data Streams use a Customer Managed Key (CMK)
        for encryption. Streams using no encryption or the AWS-managed key
        (aws/kinesis) are marked NON_COMPLIANT and auto-remediated.
      Source:
        Owner: CUSTOM_LAMBDA
        SourceIdentifier: !GetAtt ConfigRuleLambda.Arn
        SourceDetails:
          - EventSource: aws.config
            MessageType: ConfigurationItemChangeNotification
          - EventSource: aws.config
            MessageType: ScheduledNotification
      Scope:
        ComplianceResourceTypes:
          - AWS::Kinesis::Stream

  # -------------------------------------------------------
  # IAM Role — SSM Automation remediation
  # Includes KMS create permissions — only exercised at
  # remediation time when no CMK exists yet.
  # -------------------------------------------------------
  SSMRemediationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: kinesis-config-ssm-remediation-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisRemediationPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AllowKinesisRemediation
                Effect: Allow
                Action:
                  - kinesis:StartStreamEncryption
                  - kinesis:DescribeStreamSummary
                Resource: "*"
              - Sid: AllowKMSCreateAndUse
                Effect: Allow
                Action:
                  - kms:CreateKey
                  - kms:CreateAlias
                  - kms:ListAliases
                  - kms:DescribeKey
                  - kms:EnableKeyRotation
                  - kms:TagResource
                  - kms:GenerateDataKey
                  - kms:Decrypt
                  - kms:CreateGrant
                Resource: "*"
              - Sid: AllowConfigEvaluations
                Effect: Allow
                Action:
                  - config:PutEvaluations
                Resource: "*"

  # -------------------------------------------------------
  # SSM Automation Document
  # Step 1: Check if remediation CMK alias already exists
  # Step 2: Create CMK + alias if not (first run only)
  # Step 3: Wait for stream ACTIVE
  # Step 4: Enable CMK encryption
  # Step 5: Verify
  # -------------------------------------------------------
  KinesisEnableCMKDocument:
    Type: AWS::SSM::Document
    Properties:
      Name: Kinesis-EnableCMKEncryption
      DocumentType: Automation
      Content:
        schemaVersion: "0.3"
        description: >
          Remediates a non-compliant Kinesis stream by finding or creating a
          CMK (alias/kinesis-auto-remediation-cmk) and enabling encryption.
          The CMK is only created on the first remediation run.
        assumeRole: "{{ AutomationAssumeRole }}"
        parameters:
          StreamName:
            type: String
            description: Name of the Kinesis stream to remediate
          AutomationAssumeRole:
            type: String
            description: IAM role ARN for SSM Automation to assume
        mainSteps:

          - name: FindOrCreateCMK
            action: aws:executeScript
            description: >
              Look up alias/kinesis-auto-remediation-cmk. If it does not exist,
              create a new CMK with a proper key policy and attach the alias.
              Returns the CMK ARN either way.
            inputs:
              Runtime: python3.8
              Handler: find_or_create_cmk
              InputPayload:
                AccountId: !Ref AWS::AccountId
                Region: !Ref AWS::Region
              Script: |
                import boto3
                import json

                def find_or_create_cmk(events, context):
                    kms         = boto3.client('kms')
                    alias_name  = 'alias/kinesis-auto-remediation-cmk'
                    account_id  = events['AccountId']
                    region      = events['Region']

                    # Search for existing alias
                    paginator = kms.get_paginator('list_aliases')
                    for page in paginator.paginate():
                        for alias in page.get('Aliases', []):
                            if alias['AliasName'] == alias_name:
                                key_info = kms.describe_key(KeyId=alias['TargetKeyId'])
                                arn = key_info['KeyMetadata']['Arn']
                                print(f"Found existing CMK: {arn}")
                                return {'CMKArn': arn}

                    # CMK does not exist — create it
                    print("No existing CMK found — creating new CMK")
                    key_policy = json.dumps({
                        "Version": "2012-10-17",
                        "Statement": [
                            {
                                "Sid": "EnableRootAccess",
                                "Effect": "Allow",
                                "Principal": {
                                    "AWS": f"arn:aws:iam::{account_id}:root"
                                },
                                "Action": "kms:*",
                                "Resource": "*"
                            },
                            {
                                "Sid": "AllowKinesisService",
                                "Effect": "Allow",
                                "Principal": {
                                    "Service": "kinesis.amazonaws.com"
                                },
                                "Action": [
                                    "kms:GenerateDataKey",
                                    "kms:Decrypt"
                                ],
                                "Resource": "*",
                                "Condition": {
                                    "StringEquals": {
                                        "kms:CallerAccount": account_id
                                    }
                                }
                            }
                        ]
                    })

                    key = kms.create_key(
                        Description='Auto-created CMK for Kinesis stream Config remediation',
                        KeyUsage='ENCRYPT_DECRYPT',
                        KeySpec='SYMMETRIC_DEFAULT',
                        Policy=key_policy,
                        Tags=[
                            {'TagKey': 'Purpose',   'TagValue': 'kinesis-auto-remediation'},
                            {'TagKey': 'CreatedBy', 'TagValue': 'aws-config-remediation'},
                            {'TagKey': 'ManagedBy', 'TagValue': 'ssm-automation'}
                        ]
                    )

                    key_arn = key['KeyMetadata']['Arn']
                    key_id  = key['KeyMetadata']['KeyId']

                    # Enable automatic key rotation
                    kms.enable_key_rotation(KeyId=key_id)

                    # Attach alias
                    kms.create_alias(AliasName=alias_name, TargetKeyId=key_id)

                    print(f"Created new CMK: {key_arn}")
                    return {'CMKArn': key_arn}

            outputs:
              - Name: CMKArn
                Selector: $.Payload.CMKArn
                Type: String

          - name: WaitForStreamActive
            action: aws:waitForAwsResourceProperty
            description: Wait until stream is ACTIVE before modifying
            inputs:
              Service: kinesis
              Api: DescribeStreamSummary
              StreamName: "{{ StreamName }}"
              PropertySelector: $.StreamDescriptionSummary.StreamStatus
              DesiredValues:
                - ACTIVE

          - name: EnableCMKEncryption
            action: aws:executeAwsApi
            description: Enable CMK encryption on the non-compliant stream
            inputs:
              Service: kinesis
              Api: StartStreamEncryption
              StreamName: "{{ StreamName }}"
              EncryptionType: KMS
              KeyId: "{{ FindOrCreateCMK.CMKArn }}"

          - name: VerifyEncryption
            action: aws:waitForAwsResourceProperty
            description: Confirm stream encryption type is now KMS
            timeoutSeconds: 120
            inputs:
              Service: kinesis
              Api: DescribeStreamSummary
              StreamName: "{{ StreamName }}"
              PropertySelector: $.StreamDescriptionSummary.EncryptionType
              DesiredValues:
                - KMS

  # -------------------------------------------------------
  # Config Remediation Configuration
  # No static CMK ARN — CMK is resolved at remediation time
  # -------------------------------------------------------
  KinesisRemediationConfig:
    Type: AWS::Config::RemediationConfiguration
    Properties:
      ConfigRuleName: !Ref KinesisCMKConfigRule
      TargetType: SSM_DOCUMENT
      TargetId: !Ref KinesisEnableCMKDocument
      Automatic: true
      MaximumAutomaticAttempts: 3
      RetryAttemptSeconds: 60
      Parameters:
        StreamName:
          ResourceValue:
            Value: RESOURCE_ID
        AutomationAssumeRole:
          StaticValue:
            Values:
              - !GetAtt SSMRemediationRole.Arn

# -------------------------------------------------------
# Outputs
# -------------------------------------------------------
Outputs:
  ConfigRuleName:
    Description: Config rule name
    Value: !Ref KinesisCMKConfigRule

  SSMDocumentName:
    Description: SSM Automation document name
    Value: !Ref KinesisEnableCMKDocument

  RemediationRoleArn:
    Description: SSM remediation role ARN
    Value: !GetAtt SSMRemediationRole.Arn

  CMKAliasNote:
    Description: Alias given to the CMK when first created by remediation
    Value: alias/kinesis-auto-remediation-cmk

  TestCommandGetComplianceStatus:
    Description: Check compliance status of all Kinesis streams
    Value: !Sub >
      aws configservice get-compliance-details-by-config-rule
      --config-rule-name kinesis-streams-must-use-cmk
      --profile Sandbox --region ${AWS::Region}

  TestCommandTriggerRemediation:
    Description: Manually trigger remediation on a non-compliant stream
    Value: !Sub >
      aws configservice start-remediation-execution
      --config-rule-name kinesis-streams-must-use-cmk
      --resource-keys '[{"resourceType":"AWS::Kinesis::Stream","resourceId":"<stream-name>"}]'
      --profile Sandbox --region ${AWS::Region}
